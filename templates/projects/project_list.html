{% load wagtailcore_tags %}

<div class="max-w-6xl mx-auto px-4 py-8">

    <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">
        My Projects
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        {% for project in projects %}
            <div class="bg-white rounded-xl shadow-md hover:shadow-xl hover:scale-105 transform transition duration-300 p-5 border">

                <h3 class="text-xl font-semibold mb-2 text-gray-900">
                    <a href="{{ project.url }}" class="hover:text-blue-600">
                        {{ project.title }}
                    </a>
                </h3>

                <div class="text-gray-600 text-sm line-clamp-3">
                    {{ project.description|richtext }}
                </div>

                <div class="mt-4">
                    <a href="{{ project.url }}"
                       class="inline-block text-sm text-blue-600 font-medium hover:underline">
                        View Project →
                    </a>
                </div>

            </div>
        {% empty %}
            <p class="text-center text-gray-500">No projects found.</p>
        {% endfor %}

    </div>

</div>
